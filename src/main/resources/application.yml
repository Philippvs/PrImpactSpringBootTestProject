# CHANGE SCENARIO: CONFIG
spring:
  application:
    name: pr-impact-test-project
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  # CHANGE SCENARIO: CONFIG - Security related config CHANGED (HIGH severity)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: new-client-id
            client-secret: ${GOOGLE_CLIENT_SECRET:secret}

# CHANGE SCENARIO: CONFIG
# Feature Flags - CHANGED (HIGH severity)
feature:
  export:
    enabled: true
  exportV2: true
  newDashboard: false

# CHANGE SCENARIO: CONFIG
# Actuator Configuration - CHANGED to expose ALL endpoints (CRITICAL severity!)
management:
  endpoints:
    web:
      exposure:
        include: "*"

# CHANGE SCENARIO: CONFIG
# Logging Configuration - CHANGED to DEBUG (LOW severity)
logging:
  level:
    root: DEBUG
    com.primpact.testproject: DEBUG
    org.springframework.security: DEBUG
