# CHANGE SCENARIO: CONFIG
spring:
  application:
    name: pr-impact-test-project
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  # CHANGE SCENARIO: CONFIG - Security related config
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: original-client-id
            client-secret: ${GOOGLE_CLIENT_SECRET:secret}

# CHANGE SCENARIO: CONFIG
# Feature Flags - Change these to test config drift scenarios
feature:
  export:
    enabled: false
  exportV2: false
  newDashboard: false

# CHANGE SCENARIO: CONFIG
# Actuator Configuration - Modify exposure for security testing
management:
  endpoints:
    web:
      exposure:
        include: health,info

# CHANGE SCENARIO: CONFIG
# Logging Configuration - Change level for debugging scenarios
logging:
  level:
    root: INFO
    com.primpact.testproject: INFO
    org.springframework.security: INFO
