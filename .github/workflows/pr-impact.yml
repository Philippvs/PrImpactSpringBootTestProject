name: PR Impact Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Impact
        uses: Philippvs/pr-impact@v2.5.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
